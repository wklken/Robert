name: Documentation issue
description: Report unclear, missing, or incorrect documentation
title: "[Docs] "
labels: ["documentation"]
body:
  - type: input
    id: version
    attributes:
      label: Robert version
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Host OS and Python version
    validations:
      required: true
  - type: textarea
    id: doctor
    attributes:
      label: Redacted doctor output
      description: Include `robert doctor --output json` when the issue is environment-specific.
      render: json
  - type: textarea
    id: location
    attributes:
      label: Document and section
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Commands or steps that expose the problem
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected documentation
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Current documentation
    validations:
      required: true
  - type: checkboxes
    id: redaction
    attributes:
      label: Redaction confirmation
      options:
        - label: I removed secrets, credentials, private repository content, and sensitive local paths.
          required: true
