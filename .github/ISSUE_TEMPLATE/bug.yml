name: Bug report
description: Report a reproducible Robert defect
title: "[Bug] "
labels: ["bug"]
body:
  - type: input
    id: version
    attributes:
      label: Robert version
      placeholder: "0.1.0b1"
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Host OS and Python version
      placeholder: "Ubuntu 24.04, Python 3.12"
    validations:
      required: true
  - type: textarea
    id: doctor
    attributes:
      label: Redacted doctor output
      description: Paste redacted `robert doctor --output json` output.
      render: json
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction steps
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected result
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual result
    validations:
      required: true
  - type: checkboxes
    id: redaction
    attributes:
      label: Redaction confirmation
      options:
        - label: I removed secrets, credentials, private repository content, and sensitive local paths.
          required: true
